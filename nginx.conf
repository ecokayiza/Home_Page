
user admin;

worker_processes  1;

events {
    worker_connections  1024;
}


http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Strapi 子域名
    server {
        listen 80;
        server_name admin.ecokayizasweb.xyz;

        root /usr/local/nginx/html;

        location /.well-known/acme-challenge/ {
            allow all;
        }

        return 301 https://$host$request_uri;
    }
    server {
        listen 443 ssl;
        server_name admin.ecokayizasweb.xyz;
        ssl_certificate /etc/letsencrypt/live/admin.ecokayizasweb.xyz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/admin.ecokayizasweb.xyz/privkey.pem;

        location / {
            proxy_pass http://127.0.0.1:8004; # Strapi 端口
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # 主页和 Next.js
    server {
        listen 80;
        server_name 121.40.165.119 www.ecokayizasweb.xyz ecokayizasweb.xyz;
        return 301 https://$host$request_uri;
    }
    server {
        listen 443 ssl;
        server_name www.ecokayizasweb.xyz ecokayizasweb.xyz;
        ssl_certificate /etc/letsencrypt/live/www.ecokayizasweb.xyz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/www.ecokayizasweb.xyz/privkey.pem;

        # homepage
        location / {
            proxy_pass http://127.0.0.1:3000/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        location /ros/ {
            proxy_pass http://127.0.0.1:8002/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Script-Name /ros; # 设置脚本名称，确保后端应用正确处理路径

        }

        location = /live {
            root /home/admin/homePage/live;
            try_files $uri $uri.html =404;
        }

        location /hls/ {
            alias /tmp/hls/;
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            add_header Cache-Control no-cache always;
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept" always;
            
            # 对于不存在的文件返回204而不是404
            try_files $uri =204;
        }

        location /socket.io/ {
            proxy_pass http://127.0.0.1:8001/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        location /vis/ {
            proxy_pass http://127.0.0.1:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Script-Name /vis; # 设置脚本名称，确保后端应用正确处理路径

        }

        location /vis/static/ {
            alias /home/admin/Vis_Design/static/;
            access_log off;
            expires 30d;
        }

    }
}

rtmp {
    server {
        listen 1935;  # RTMP 默认端口
        chunk_size 4096;

        application live {
            live on;
            record off;

            # HLS配置
            hls on;
            hls_path /tmp/hls;
            hls_fragment 3s;
            hls_playlist_length 60s;
        }
    }
}




